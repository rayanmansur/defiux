<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeFi Simulator - Nimbus HyperLivid Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --default-hand-cursor: url("uploads/cursors/hand-default-cursor.png") 18 8, default;
      --pointer-hand-cursor: url("uploads/cursors/hand-pointer-cursor.png") 48 6, pointer;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: var(--default-hand-cursor) !important; }
    button, a, label, select, input[type=button], input[type=submit], input[type=range], input[type=checkbox], [role="button"], [onclick], [style*="pointer"] { cursor: var(--pointer-hand-cursor) !important; }
    [style*="not-allowed"] { cursor: not-allowed !important; }
    [style*="default"] { cursor: var(--default-hand-cursor) !important; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0e; }
    #root { width: 100%; height: 100%; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="click-feedback.js?v=1"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="shared-state.js?v=4"></script>
  <script type="text/babel" src="DAppPanel.jsx?v=5"></script>
  <script type="text/babel" src="CoinbasePanel.jsx?v=4"></script>
  <script type="text/babel" src="NimbusWalletPanel.jsx?v=3"></script>
  <script type="text/babel" src="NimbusScenarioSetup.jsx?v=1"></script>
  <script type="text/babel" src="NimbusHyperMain.jsx?v=3"></script>
</body>
</html>
