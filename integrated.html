<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nimbus Integrated dApp Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --default-hand-cursor: url("uploads/cursors/hand-default-cursor.png") 18 8, default;
      --pointer-hand-cursor: url("uploads/cursors/hand-pointer-cursor.png") 48 6, pointer;
      --page-bg: #101116;
      --tablet: #07080b;
      --screen: #f3f4f1;
      --ink: #15171d;
      --muted: #667085;
      --line: rgba(20, 23, 30, 0.12);
      --panel: #ffffff;
      --soft: #edf0f3;
      --hyper: #00c59a;
      --waave: #7b4ef6;
      --warn: #ef8b3a;
      --danger: #e54f6d;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      cursor: var(--default-hand-cursor) !important;
    }

    button,
    button *,
    a,
    a *,
    label,
    label *,
    select,
    input[type=button],
    input[type=submit],
    input[type=range],
    input[type=checkbox],
    [role="button"],
    [role="button"] *,
    [onclick],
    [onclick] *,
    [style*="pointer"],
    [style*="pointer"] * {
      cursor: var(--pointer-hand-cursor) !important;
    }

    [disabled],
    [aria-disabled="true"],
    [style*="not-allowed"] {
      cursor: not-allowed !important;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0) 32%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 48px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 48px),
        var(--page-bg);
      color: var(--ink);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    #root {
      width: min(1240px, 100%);
      height: min(880px, 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    .tablet {
      position: relative;
      width: 100%;
      height: 100%;
      border: 10px solid var(--tablet);
      border-radius: 36px;
      background: var(--tablet);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.48);
      overflow: hidden;
    }

    .tablet::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      width: 88px;
      height: 8px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #171920;
      z-index: 5;
    }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 26px;
      background: var(--screen);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .home-bar {
      position: absolute;
      left: 50%;
      bottom: 13px;
      width: 128px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.2);
      z-index: 8;
    }

    .status-bar {
      height: 34px;
      padding: 12px 30px 0;
      display: flex;
      justify-content: space-between;
      color: rgba(21, 23, 29, 0.76);
      font-size: 12px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .status-icons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .status-pill {
      width: 22px;
      height: 9px;
      border: 1px solid rgba(21, 23, 29, 0.45);
      border-radius: 4px;
      position: relative;
    }

    .status-pill::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 15px;
      height: 3px;
      border-radius: 3px;
      background: rgba(21, 23, 29, 0.7);
    }

    .page {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 18px 30px 38px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 16px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }

    h1 {
      color: var(--ink);
      font-size: clamp(28px, 4.2vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }

    h2 {
      color: var(--ink);
      font-size: 19px;
      letter-spacing: 0;
    }

    h3 {
      color: var(--ink);
      font-size: 15px;
      letter-spacing: 0;
    }

    .account-pill {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 38px;
      padding: 0 13px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .account-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #2fba78;
    }

    .portfolio-panel {
      display: grid;
      grid-template-columns: minmax(240px, 1.2fr) repeat(3, minmax(120px, 0.7fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric,
    .asset-row,
    .app-section,
    .app-tile,
    .app-shell-panel,
    .flow-card,
    .market-card,
    .modal-card {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 26px rgba(20, 23, 30, 0.05);
    }

    .metric {
      padding: 16px;
      min-width: 0;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 7px;
    }

    .metric-value {
      font-size: 27px;
      font-weight: 900;
      color: var(--ink);
      line-height: 1;
    }

    .metric-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .asset-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 22px;
    }

    .asset-row {
      min-height: 74px;
      padding: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .token-icon,
    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: #fff;
      font-weight: 900;
      border-radius: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .token-icon {
      width: 32px;
      height: 32px;
      font-size: 13px;
    }

    .brand-icon {
      width: 46px;
      height: 46px;
      font-size: 23px;
    }

    .asset-meta {
      min-width: 0;
    }

    .asset-meta strong {
      display: block;
      font-size: 13px;
      color: var(--ink);
    }

    .asset-meta span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .app-section {
      padding: 18px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 190px));
      gap: 16px;
    }

    .app-tile {
      aspect-ratio: 1 / 1;
      width: 100%;
      padding: 15px;
      text-align: left;
      color: inherit;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .app-tile:hover,
    .app-tile:focus-visible {
      transform: translateY(-2px);
      outline: none;
      border-color: rgba(21, 23, 29, 0.26);
      box-shadow: 0 16px 34px rgba(20, 23, 30, 0.12);
    }

    .app-tile-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .app-name {
      margin-top: 12px;
      color: var(--ink);
      font-weight: 900;
      font-size: 19px;
      letter-spacing: 0;
    }

    .app-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 6px;
    }

    .app-stat {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 25px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--ink);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .history-list {
      margin-top: 16px;
      display: grid;
      gap: 8px;
      max-width: 520px;
    }

    .history-item {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.64);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .history-item strong {
      color: var(--ink);
    }

    .history-item span,
    .history-item small {
      color: var(--muted);
    }

    .app-view {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #0c0e12;
      color: #eef2f6;
    }

    .app-view.waave {
      background: #f7f8fb;
      color: var(--ink);
    }

    .app-header {
      min-height: 58px;
      flex: 0 0 auto;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(6, 8, 12, 0.94);
    }

    .waave .app-header {
      background: rgba(255,255,255,0.92);
      border-bottom-color: var(--line);
      color: var(--ink);
    }

    .back-button,
    .action-button,
    .ghost-button,
    .asset-button,
    .tab-button,
    .quick-button {
      min-height: 36px;
      border-radius: 8px;
      font-weight: 800;
      color: inherit;
    }

    .back-button {
      padding: 0 12px;
      background: rgba(255,255,255,0.08);
      color: #f4f7fb;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .waave .back-button {
      background: #eef1f6;
      color: var(--ink);
      border-color: var(--line);
    }

    .app-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .app-brand-title {
      font-weight: 900;
      font-size: 16px;
      white-space: nowrap;
    }

    .app-brand-sub {
      color: rgba(238,242,246,0.58);
      font-size: 11px;
      font-weight: 700;
      margin-top: 2px;
      white-space: nowrap;
    }

    .waave .app-brand-sub {
      color: var(--muted);
    }

    .header-spacer {
      flex: 1;
      min-width: 8px;
    }

    .header-metric {
      padding: 7px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #eef2f6;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .waave .header-metric {
      background: #eef1f6;
      color: var(--ink);
      border-color: var(--line);
    }

    .app-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .hyper-grid {
      height: 100%;
      min-height: 560px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .market-band,
    .chart-panel,
    .orders-panel,
    .position-strip,
    .waave-summary,
    .waave-market,
    .waave-flow {
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.045);
    }

    .waave-summary,
    .waave-market,
    .waave-flow {
      background: #fff;
      border-color: var(--line);
    }

    .market-band {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(6, minmax(92px, 1fr));
      gap: 1px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
    }

    .market-stat {
      padding: 12px;
      background: #11141a;
    }

    .market-stat span {
      display: block;
      color: rgba(238,242,246,0.55);
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .market-stat strong {
      font-size: 14px;
      color: #f8fbff;
    }

    .chart-panel {
      padding: 14px;
      min-width: 0;
      overflow: hidden;
    }

    .chart-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #f8fbff;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .chart-title span {
      color: rgba(238,242,246,0.55);
      font-size: 11px;
      font-weight: 700;
    }

    .orders-panel {
      padding: 14px;
      overflow: hidden;
    }

    .order-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      color: rgba(238,242,246,0.7);
      font-size: 11px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .order-row strong {
      color: #f5f8fb;
    }

    .position-strip {
      grid-column: 1 / 2;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .flow-card {
      grid-column: 2 / 3;
      grid-row: 2 / 4;
      align-self: stretch;
      padding: 16px;
      background: #151820;
      border-color: rgba(255,255,255,0.1);
      color: #eef2f6;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .flow-card.light {
      background: #fff;
      border-color: var(--line);
      color: var(--ink);
    }

    .flow-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .flow-title p {
      color: rgba(238,242,246,0.6);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 6px;
    }

    .light .flow-title p {
      color: var(--muted);
    }

    .asset-pick {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .asset-button {
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #eef2f6;
      text-align: left;
      display: flex;
      gap: 9px;
      align-items: center;
    }

    .asset-button.selected {
      border-color: var(--hyper);
      background: rgba(0,197,154,0.12);
    }

    .light .asset-button {
      background: #f4f6f8;
      border-color: var(--line);
      color: var(--ink);
    }

    .light .asset-button.selected {
      border-color: var(--waave);
      background: rgba(123,78,246,0.09);
    }

    .asset-button small {
      color: rgba(238,242,246,0.58);
      font-size: 10px;
      display: block;
      margin-top: 2px;
    }

    .light .asset-button small {
      color: var(--muted);
    }

    .amount-box {
      border-radius: 8px;
      padding: 13px;
      background: rgba(0,0,0,0.16);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .light .amount-box {
      background: #f5f7fa;
      border-color: var(--line);
    }

    .amount-box label {
      display: flex;
      justify-content: space-between;
      color: rgba(238,242,246,0.62);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .light .amount-box label {
      color: var(--muted);
    }

    .amount-entry {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .amount-entry input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: 0;
      outline: none;
      color: #f8fbff;
      font-size: 25px;
      font-weight: 900;
    }

    .light .amount-entry input {
      color: var(--ink);
    }

    .quick-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 10px;
    }

    .quick-button {
      background: rgba(255,255,255,0.08);
      color: #eef2f6;
      font-size: 12px;
    }

    .light .quick-button {
      background: #e9edf4;
      color: var(--ink);
    }

    .route-box {
      padding: 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.055);
      color: rgba(238,242,246,0.7);
      font-size: 12px;
      line-height: 1.65;
    }

    .light .route-box {
      background: #f5f7fa;
      color: var(--muted);
    }

    .route-box div {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .route-box strong {
      color: #f8fbff;
      text-align: right;
    }

    .light .route-box strong {
      color: var(--ink);
    }

    .action-button {
      width: 100%;
      min-height: 46px;
      background: var(--hyper);
      color: #06100e;
      font-size: 14px;
    }

    .action-button.purple {
      background: var(--waave);
      color: #fff;
    }

    .action-button:disabled {
      background: rgba(255,255,255,0.1);
      color: rgba(238,242,246,0.42);
    }

    .light .action-button:disabled {
      background: #e5e8ee;
      color: var(--muted);
    }

    .error-box {
      padding: 10px 12px;
      border-radius: 8px;
      color: #ff9aad;
      background: rgba(229,79,109,0.12);
      border: 1px solid rgba(229,79,109,0.26);
      font-size: 12px;
      line-height: 1.4;
    }

    .light .error-box {
      color: #b21e3c;
      background: rgba(229,79,109,0.08);
    }

    .mini-metric {
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.055);
      min-width: 0;
    }

    .mini-metric span {
      color: rgba(238,242,246,0.55);
      font-size: 11px;
      display: block;
      margin-bottom: 5px;
    }

    .mini-metric strong {
      color: #f8fbff;
      font-size: 15px;
    }

    .waave-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 14px;
      min-height: 100%;
      align-items: start;
    }

    .waave-left {
      display: contents;
    }

    .waave-left > * {
      grid-column: 1 / 2;
      min-width: 0;
    }

    .waave-left > :nth-child(1) {
      grid-row: 1;
    }

    .waave-left > :nth-child(2) {
      grid-row: 2;
    }

    .waave-left > :nth-child(3) {
      grid-row: 3;
    }

    .waave-flow {
      grid-column: 2 / 3;
      grid-row: 2 / 4;
      align-self: start;
      max-height: calc(100vh - 230px);
      overflow: auto;
    }

    .waave-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      overflow: hidden;
      background: var(--line);
    }

    .waave-summary .mini-metric {
      border-radius: 0;
      background: #fff;
    }

    .waave-summary .mini-metric span {
      color: var(--muted);
    }

    .waave-summary .mini-metric strong {
      color: var(--ink);
    }

    .waave-market {
      padding: 16px;
      min-width: 0;
    }

    .market-table {
      display: grid;
      gap: 1px;
      background: var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 12px;
    }

    .market-table-row {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr 1fr 92px;
      gap: 12px;
      align-items: center;
      min-height: 50px;
      padding: 10px 12px;
      background: #fff;
      font-size: 12px;
    }

    .market-table-row.header {
      min-height: 36px;
      background: #f5f7fa;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .market-table-row strong {
      color: var(--ink);
    }

    .market-table-row span {
      color: var(--muted);
    }

    .ghost-button {
      padding: 0 10px;
      background: #eef1f6;
      color: var(--ink);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .tab-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 4px;
      border-radius: 8px;
      background: #eef1f6;
    }

    .tab-button {
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }

    .tab-button.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 5px 16px rgba(20,23,30,0.08);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(7, 8, 11, 0.68);
    }

    .modal-card {
      width: min(430px, 100%);
      padding: 24px;
      text-align: center;
      background: #fff;
    }

    .modal-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 28px;
      font-weight: 900;
    }

    .modal-card p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin: 10px 0 16px;
    }

    .empty-note {
      padding: 14px;
      border-radius: 8px;
      background: #f5f7fa;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      body {
        padding: 0;
      }

      #root {
        height: 100%;
      }

      .tablet {
        border: 0;
        border-radius: 0;
      }

      .screen {
        border-radius: 0;
      }

      .tablet::before,
      .home-bar {
        display: none;
      }

      .portfolio-panel,
      .asset-strip,
      .waave-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hyper-grid,
      .waave-grid {
        grid-template-columns: 1fr;
        height: auto;
      }

      .flow-card {
        grid-column: auto;
        grid-row: auto;
      }

      .waave-left {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .waave-left > *,
      .waave-flow {
        grid-column: auto;
        grid-row: auto;
      }

      .waave-flow {
        max-height: none;
        overflow: visible;
      }

      .position-strip,
      .market-band {
        grid-column: auto;
        grid-template-columns: repeat(2, 1fr);
      }

      .market-table-row {
        grid-template-columns: 1.4fr 0.8fr 0.8fr;
      }

      .market-table-row > :nth-child(4),
      .market-table-row > :nth-child(5) {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .status-bar {
        padding-inline: 18px;
      }

      .page,
      .app-body {
        padding-inline: 14px;
      }

      .top-row,
      .app-header {
        flex-wrap: wrap;
      }

      .portfolio-panel,
      .asset-strip,
      .app-grid,
      .asset-pick,
      .position-strip,
      .market-band,
      .waave-summary {
        grid-template-columns: 1fr;
      }

      .app-grid {
        max-width: 220px;
      }

      .header-metric {
        flex: 1 1 130px;
        text-align: center;
      }

      .history-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="click-feedback.js?v=1"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="IntegratedMain.jsx?v=1"></script>
</body>
</html>
